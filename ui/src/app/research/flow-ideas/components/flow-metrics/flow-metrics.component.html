<section class="flow-metrics" aria-label="Visible Flow Ideas metrics">
  <article class="flow-metric">
    <span>Active ideas</span>
    <strong>{{ metrics.active }}</strong>
    <small>visible research queue</small>
  </article>
  <article class="flow-metric">
    <span>Persistent</span>
    <strong>{{ metrics.persistent }}</strong>
    <small>2+ consecutive reports</small>
  </article>
  <article class="flow-metric">
    <span>Unusual overlap</span>
    <strong>{{ metrics.unusual }}</strong>
    <small>unusual-position evidence</small>
  </article>
  <article class="flow-metric">
    <span>Changed today</span>
    <strong>{{ metrics.changed }}</strong>
    <small>return, reversal, or strength</small>
  </article>
</section>
