server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # ─── Turn off zero‐copy optimizations that can truncate large files ─────────
    sendfile           off;
    tcp_nopush         off;
    tcp_nodelay        on;
    directio           512;             # disable direct I/O for files <512 byte boundary
    output_buffers     1 32k;
    postpone_output    1460;

    # ─── Global caching/compression (optional but recommended) ─────────────────
    gzip               on;
    gzip_min_length    1000;
    gzip_proxied       any;
    gzip_types         text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ─── Main route: serve files if they exist, otherwise fallback to index.html ─
    location /v1/ {
        proxy_pass         http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # FlowPatrol remains owned and served by market-data-pipeline on the mini.
    # This same-origin adapter avoids browser CORS and keeps its outage isolated
    # from the journal API and SPA.
    location /research-api/ {
        client_max_body_size 21m;
        proxy_pass         ${RESEARCH_BACKEND_URL}/;
        proxy_http_version 1.1;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 180s;
        proxy_set_header   Host $proxy_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Static assets: JS/CSS/images/fonts/etc. ─────────────────────────────────
    location ~* \.(?:js|css|png|jpg|jpeg|svg|gif|ico|woff2?|ttf)$ {
        try_files      $uri =404;
        expires         max;
        add_header      Cache-Control "public";
        access_log      off;
    }
}
