services:
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "8877:80"
    restart: unless-stopped
    depends_on:
      - api
    environment:
      RESEARCH_BACKEND_URL: ${RESEARCH_BACKEND_URL:-http://192.168.50.248:8765}

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    ports:
      - "8876:5000"
    volumes:
      - ./api:/app
    environment:
      - TASTYTRADE_USERNAME
      - TASTYTRADE_PASSWORD
      - TASTYTRADE_SECRET
      - TASTYTRADE_REFRESH
      - TASTYTRADE_URL
      - LIVE_TRADING_ENABLED
      - BROKERAGE_WATCHLIST_WRITES_ENABLED
      - CORS_ORIGINS
